name: Release CLI (SEA)

# The CLI ships as a Single Executable Application, not plain JS: a per-platform
# binary that bundles its own Node runtime so the node:sqlite store works on any
# shell Node. Each platform's binary is published as its own package
# (@shellicar/claude-sdk-cli-<platform>-<arch>), and the main package selects the
# matching one via optionalDependencies. This workflow builds those binaries on
# their native runners and publishes them, then publishes the main launcher.
#
# It owns claude-sdk-cli releases; npm-publish.yml skips that tag (see its guard).

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to test (e.g. claude-sdk-cli@1.0.0-beta.10)'
        required: true

jobs:
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      is-cli: ${{ steps.tag.outputs.is-cli }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - name: Parse release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi
          PACKAGE_NAME="${TAG%%@*}"
          VERSION="${TAG#*@}"
          if [ "$PACKAGE_NAME" = "claude-sdk-cli" ]; then
            echo "is-cli=true" >> "$GITHUB_OUTPUT"
          else
            echo "is-cli=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Package: $PACKAGE_NAME"
          echo "Version: $VERSION"

  platform:
    needs: prepare
    if: needs.prepare.outputs.is-cli == 'true'
    permissions:
      contents: read
      id-token: write  # OIDC token for npm provenance attestation
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS arm64 is the only active platform. codesign (the strip/re-sign
          # bracket the SEA needs) is Apple-only, so this row must run on a macOS
          # arm64 runner — GitHub's hosted macos-14 image is arm64.
          - runner: macos-14
            platform: darwin-arm64
            gitversion: osx-arm64
          # --- Future platforms: uncomment a row to add one. Each needs its own
          # --- platforms/<name> package dir and a matching optionalDependency in
          # --- apps/claude-sdk-cli/package.json. Linux/Windows each need their
          # --- own platform signing worked out before going live.
          # - runner: ubuntu-24.04
          #   platform: linux-x64
          #   gitversion: linux-x64
          # - runner: windows-2022
          #   platform: win32-x64
          #   gitversion: win-x64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install GitVersion
        run: |
          curl -sL --retry 3 --retry-delay 5 https://github.com/GitTools/GitVersion/releases/download/6.6.0/gitversion-${{ matrix.gitversion }}-6.6.0.tar.gz -o /tmp/gitversion.tar.gz
          sudo tar xzf /tmp/gitversion.tar.gz -C /usr/local/bin gitversion
          sudo chmod +x /usr/local/bin/gitversion

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26  # bundled SEA runtime needs Node 26 (mainFormat: module)
          registry-url: https://registry.npmjs.org/
          cache: 'pnpm'

      - run: pnpm i --frozen-lockfile
      - run: pnpm run build  # builds workspace deps the CLI bundle pulls in

      - name: Build SEA binary
        run: SEA_NODE="$(node -e 'process.stdout.write(process.execPath)')" bash apps/claude-sdk-cli/build-sea.sh

      - name: Stage binary into platform package
        run: cp apps/claude-sdk-cli/dist/claude-sdk-cli platforms/claude-sdk-cli-${{ matrix.platform }}/claude-sdk-cli

      - name: Verify version matches tag
        run: |
          cd platforms/claude-sdk-cli-${{ matrix.platform }}
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$PKG_VERSION" != "${{ needs.prepare.outputs.version }}" ]; then
            echo "❌ Version mismatch: package.json $PKG_VERSION vs tag ${{ needs.prepare.outputs.version }}"
            exit 1
          fi

      - name: Decide dist-tag
        id: dist-tag
        run: |
          pnpm --filter scripts exec tsx src/decide-cli.ts --package-dir "platforms/claude-sdk-cli-${{ matrix.platform }}" --current-latest "" >> "$GITHUB_OUTPUT"

      - name: Publish platform package
        run: |
          DRY_RUN=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DRY_RUN="--dry-run"
            echo "⚠️ Dry run: workflow_dispatch trigger"
          fi
          cd platforms/claude-sdk-cli-${{ matrix.platform }}
          pnpm publish --provenance --ignore-scripts --no-git-checks --tag "${{ steps.dist-tag.outputs.channel }}" $DRY_RUN

  main:
    needs: [prepare, platform]
    if: needs.prepare.outputs.is-cli == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          cache: 'pnpm'

      - run: pnpm i --frozen-lockfile

      - name: Verify version matches tag
        run: |
          cd apps/claude-sdk-cli
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$PKG_VERSION" != "${{ needs.prepare.outputs.version }}" ]; then
            echo "❌ Version mismatch: package.json $PKG_VERSION vs tag ${{ needs.prepare.outputs.version }}"
            exit 1
          fi

      - name: Decide dist-tag
        id: dist-tag
        run: |
          pnpm --filter scripts exec tsx src/decide-cli.ts --package-dir "apps/claude-sdk-cli" --current-latest "" >> "$GITHUB_OUTPUT"

      - name: Publish main package
        run: |
          DRY_RUN=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DRY_RUN="--dry-run"
            echo "⚠️ Dry run: workflow_dispatch trigger"
          fi
          cd apps/claude-sdk-cli
          pnpm publish --provenance --ignore-scripts --no-git-checks --tag "${{ steps.dist-tag.outputs.channel }}" $DRY_RUN
