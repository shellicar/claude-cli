name: Node.js Package

# Single publish entrypoint. Every release fires this once; `prepare` parses the
# tag and the jobs branch on it:
#   - non-CLI packages take `publish-generic` (plain `pnpm publish`).
#   - claude-sdk-cli takes the SEA path: `platform` (per-platform binary
#     packages, built on their native runners) then `main` (the launcher).
# Exactly one branch runs per release — there is no second workflow to guard
# against, because `on: release` has no tag filter and would fire both.
#
# Shared boilerplate lives in local composite actions under .github/actions:
#   - install-gitversion: the build-time gitversion install (asset suffix varies)
#   - publish-package:     verify version -> decide dist-tag -> pnpm publish

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to test (e.g. claude-sdk-cli@1.0.0-beta.5)'
        required: true

jobs:
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      is-cli: ${{ steps.tag.outputs.is-cli }}
      package: ${{ steps.tag.outputs.package }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - name: Parse release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi
          if [[ "$TAG" != *"@"* ]]; then
            echo "❌ Tag '$TAG' is not in package@version format"
            exit 1
          fi
          PACKAGE_NAME="${TAG%%@*}"
          VERSION="${TAG#*@}"
          echo "package=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # claude-sdk-cli ships as a SEA (per-platform binaries); everything
          # else is a plain npm publish. The tag picks the branch.
          if [ "$PACKAGE_NAME" = "claude-sdk-cli" ]; then
            echo "is-cli=true" >> "$GITHUB_OUTPUT"
          else
            echo "is-cli=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Package: $PACKAGE_NAME"
          echo "Version: $VERSION"

  # --- Branch A: every package except claude-sdk-cli -------------------------
  publish-generic:
    needs: prepare
    if: needs.prepare.outputs.is-cli == 'false'
    runs-on: ubuntu-24.04
    permissions:
      contents: read   # actions/checkout needs this to clone
      id-token: write  # OIDC token for npm provenance attestation
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/install-gitversion

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          cache: 'pnpm'

      - run: pnpm i --frozen-lockfile
      - run: pnpm run --if-present build --only
      - run: pnpm run --if-present type-check --only
      - run: pnpm run --if-present test --only
      - run: pnpm run ci

      - name: Resolve package directory
        id: package
        env:
          PACKAGE_NAME: ${{ needs.prepare.outputs.package }}
        run: |
          PACKAGE_DIR=$(node -e "
            const fs = require('fs');
            const name = process.env.PACKAGE_NAME;
            const dirs = ['apps', 'packages']
              .flatMap(d => fs.readdirSync(d).map(p => d + '/' + p))
              .filter(d => { try { fs.statSync(d + '/package.json'); return true; } catch { return false; } });
            const match = dirs.find(d => {
              const pkg = JSON.parse(fs.readFileSync(d + '/package.json', 'utf8'));
              return pkg.name.split('/').pop() === name;
            });
            if (!match) { process.stderr.write('No package found for: ' + name + '\\n'); process.exit(1); }
            process.stdout.write(match);
          ")
          echo "dir=$PACKAGE_DIR" >> "$GITHUB_OUTPUT"
          echo "Package directory: $PACKAGE_DIR"

      - name: Verify changelog
        run: |
          CHANGELOG="${{ steps.package.outputs.dir }}/CHANGELOG.md"
          if [ ! -f "$CHANGELOG" ]; then
            echo "❌ No CHANGELOG.md found in ${{ steps.package.outputs.dir }}"
            exit 1
          fi
          # Strip pre-release suffix to get base version (e.g. 1.0.0-alpha.5 → 1.0.0)
          BASE_VERSION=$(echo "${{ needs.prepare.outputs.version }}" | sed 's/^\([0-9]*\.[0-9]*\.[0-9]*\).*/\1/')
          FIRST_VERSION=$(grep -oE '^## \[[0-9]+\.[0-9]+\.[0-9]+\]' "$CHANGELOG" | head -n1 | sed 's/## \[\(.*\)\]/\1/')
          if [ -z "$FIRST_VERSION" ]; then
            echo "✅ No version entries yet — OK for pre-release"
            exit 0
          fi
          if [ "$BASE_VERSION" != "$FIRST_VERSION" ]; then
            echo "❌ First changelog entry [$FIRST_VERSION] does not match release base version [$BASE_VERSION]"
            exit 1
          fi
          if ! grep -qE "^## \[$BASE_VERSION\] - [0-9]{4}-[0-9]{2}-[0-9]{2}$" "$CHANGELOG"; then
            echo "❌ Entry ## [$BASE_VERSION] is missing a date (expected: ## [$BASE_VERSION] - YYYY-MM-DD)"
            exit 1
          fi
          echo "✅ Changelog OK"

      - uses: ./.github/actions/publish-package
        with:
          package-dir: ${{ steps.package.outputs.dir }}
          version: ${{ needs.prepare.outputs.version }}

  # --- Branch B: claude-sdk-cli, per-platform SEA binaries ------------------
  # The CLI ships as a Single Executable Application, not plain JS: a per-platform
  # binary that bundles its own Node runtime so the node:sqlite store works on any
  # shell Node. Each platform's binary is published as its own package
  # (@shellicar/claude-sdk-cli-<platform>-<arch>); the main package selects the
  # matching one via optionalDependencies. Platform packages publish first so the
  # main package's optional dependency resolves.
  platform:
    needs: prepare
    if: needs.prepare.outputs.is-cli == 'true'
    permissions:
      contents: read
      id-token: write  # OIDC token for npm provenance attestation
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS arm64 is the only active platform. codesign (the strip/re-sign
          # bracket the SEA needs) is Apple-only, so this row must run on a macOS
          # arm64 runner — GitHub's hosted macos-14 image is arm64.
          - runner: macos-14
            platform: darwin-arm64
            gitversion: osx-arm64
          # --- Future platforms: uncomment a row to add one. Each needs its own
          # --- platforms/<name> package dir and a matching optionalDependency in
          # --- apps/claude-sdk-cli/package.json. Linux/Windows each need their
          # --- own platform signing worked out before going live.
          # - runner: ubuntu-24.04
          #   platform: linux-x64
          #   gitversion: linux-x64
          # - runner: windows-2022
          #   platform: win32-x64
          #   gitversion: win-x64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/install-gitversion
        with:
          platform: ${{ matrix.gitversion }}

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26  # bundled SEA runtime needs Node 26 (mainFormat: module)
          registry-url: https://registry.npmjs.org/
          cache: 'pnpm'

      - run: pnpm i --frozen-lockfile
      - run: pnpm run build  # builds workspace deps the CLI bundle pulls in

      - name: Build SEA binary
        # build-sea.sh writes the signed binary into platforms/claude-sdk-cli-<platform>/
        # (platform derived from this runner), which is what publish reads below.
        run: SEA_NODE="$(node -e 'process.stdout.write(process.execPath)')" bash apps/claude-sdk-cli/build-sea.sh

      - uses: ./.github/actions/publish-package
        with:
          package-dir: platforms/claude-sdk-cli-${{ matrix.platform }}
          version: ${{ needs.prepare.outputs.version }}

  main:
    needs: [prepare, platform]
    if: needs.prepare.outputs.is-cli == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          cache: 'pnpm'

      - run: pnpm i --frozen-lockfile

      - uses: ./.github/actions/publish-package
        with:
          package-dir: apps/claude-sdk-cli
          version: ${{ needs.prepare.outputs.version }}
