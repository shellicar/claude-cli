# This workflow will run tests using node and then publish a package to GitHub Packages when a release is created
# For more information see: https://docs.github.com/en/actions/publishing-packages/publishing-nodejs-packages

name: Node.js Package

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install GitVersion
        run: |
          curl -sL https://github.com/GitTools/GitVersion/releases/download/6.6.0/gitversion-linux-x64-6.6.0.tar.gz -o /tmp/gitversion.tar.gz
          tar xzf /tmp/gitversion.tar.gz -C /usr/local/bin gitversion
          chmod +x /usr/local/bin/gitversion
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org/'
          cache: true
      - run: vp install
      - run: vp pm audit
      - run: vp check
      - run: vp test
      - run: vp run build
      - run: |
          . ./scripts/get-npm-tag.sh
          cd "packages/$(cat .packagename)"

          VERSION=$(node -p "require('./package.json').version")
          echo "Package version: $VERSION"
          TAG=$(get_npm_tag "$VERSION")
          if [ $? -ne 0 ]; then
            echo "Failed to get valid npm tag: $TAG"
            exit 1
          fi
          echo "Publishing with tag: $TAG"

          vp pm publish --ignore-scripts --no-git-checks --tag "$TAG"
        env:
          NODE_AUTH_TOKEN: ${{secrets.npm_token}}
