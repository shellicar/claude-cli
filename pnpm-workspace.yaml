packages:
  - apps/*
  - packages/*
  - scripts

ignoreScripts: true
minimumReleaseAge: 1440
blockExoticSubdeps: true
trustPolicy: no-downgrade

trustPolicyExclude:
  - chokidar@4.0.3   # accepted: known trust-downgrade, pnpm docs' own example

overrides:
  esbuild@>=0.27.3 <0.28.1: ^0.28.1
  hono@<4.12.25: ^4.12.25
