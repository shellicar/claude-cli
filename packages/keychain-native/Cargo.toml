[package]
name = "keychain-native"
version = "0.1.0"
edition = "2021"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "2", default-features = false, features = ["napi4"] }
napi-derive = "2"
security-framework = "2"

[build-dependencies]
napi-build = "2"

[profile.release]
lto = true
strip = "symbols"
